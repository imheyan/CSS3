<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
        <link rel="stylesheet" type="text/css" href="css/style.css"/>
        <style type="text/css">
            * {
                margin: 0;
                padding: 0;
            }
            p {
                color: #000;
                margin-top: 52px;
                text-align: center;
                font: 83px/300px "微软雅黑";
                border: 1px red solid;

                /* 偏移量-x | 偏移量-y | 模糊半径 | 颜色 */
                /* 消失 */
                /* 0-没有模糊 */
                /* 模糊 */
                text-shadow:0 0 0 rgba(0, 0, 0, 1);
                transition: 2s;
            }
            p:hover {
                color:rgba(0,0,0,0);
                text-shadow:0 0 300px rgba(0, 0, 0, .5);
            }
        </style>
	</head>

	<body>
        <p>北京邮电带学</p>
	</body>

    <script type="text/javascript">
        function $(id) {
            return document.getElementById(id);
        }
    </script>
</html>
