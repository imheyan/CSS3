<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
        <style type="text/css">
            * {
                margin: 0;
                padding: 0;
            }
            .wrap {
                width: 116px;
                height: 116px;
                background-color: #BFA;
            }
            p {
                /* 用来设置如何处理元素中的空白 */
                /* 和 normal 一样，连续的空白符会被合并。但文本内的换行无效。 */
                white-space: nowrap;
                overflow: hidden;
                /* 确定如何向用户发出未显示的溢出内容信号。它可以被剪切，显示一个省略号 */
                text-overflow: ellipsis;
            }
        </style>
	</head>

	<body>
        <div class="wrap">
            <p>
                北京邮电带学     北京邮电带学
                北京邮电带学     北京邮电带学北京邮电带学
            </p>
        </div>
	</body>

    <script type="text/javascript">
        function $(id) {
            return document.getElementById(id);
        }
    </script>
</html>
