<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title></title>
		<style type="text/css">
            *{
                margin: 0;
				padding: 0;
			}
            .text {
                width: 500px;
                height: 500px;
                position: absolute;
                top: 0; right: 0; bottom: 0; left: 0;
                margin: auto;
                
                color: white;
                text-align: center;
                font: 100px/500px "微软雅黑";
                /* 设置宽度和颜色 */
                -webkit-text-stroke:4px pink;
            }
		</style>
	</head>

	<body>
        <div class="text">春风</div>
	</body>
</html>
